name: Deploy Portfolio + Notes

on:
  push:
    branches:
      - main
      - feature/hugo-notes
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: portfolio/yarn.lock

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: false

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install portfolio dependencies
        working-directory: portfolio
        run: yarn install --frozen-lockfile

      - name: Build portfolio
        working-directory: portfolio
        run: yarn build
        env:
          CI: false

      - name: Build Hugo notes
        working-directory: notes
        run: hugo --minify

      - name: Merge into combined output
        run: |
          mkdir -p combined-output/notes
          cp -r portfolio/build/. combined-output/
          cp -r notes/public/. combined-output/notes/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: combined-output/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
